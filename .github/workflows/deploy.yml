name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Monthly rebuild so the calendar year (const year = new Date().getFullYear())
  # rolls over even without content commits. Runs 03:00 UTC on the first day
  # of every month — that is 04:00 CET / 05:00 CEST in Poland.
  schedule:
    - cron: '0 3 1 * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install, build and upload
        uses: withastro/action@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
